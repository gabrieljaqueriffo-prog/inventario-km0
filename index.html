<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KM0 — Recepción de Inventario</title>
<style>
  :root{
    --rojo:#ed1c24;
    --rojo-oscuro:#7a1315;
    --gris:#58585b;
    --blanco:#ffffff;
    --verde:#22c55e;
    --amarillo:#f59e0b;
    --rojo-pend:#ef4444;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f4f4f5;
    color:var(--gris);
    -webkit-tap-highlight-color:transparent;
  }
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--blanco);position:relative;padding-bottom:24px;}

  header.topbar{
    position:sticky;top:0;z-index:50;
    background:var(--rojo);color:var(--blanco);
    padding:12px 14px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  header.topbar button.back{
    background:rgba(255,255,255,.15);
    border:none;color:var(--blanco);
    width:40px;height:40px;border-radius:8px;
    font-size:20px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  header.topbar h1{font-size:16px;margin:0;font-weight:700;line-height:1.2;}
  header.topbar .sub{font-size:11px;opacity:.85;margin:0;}

  .container{padding:14px;}

  .progress-wrap{margin-bottom:14px;}
  .progress-bar-bg{
    width:100%;height:14px;background:#e5e5e7;border-radius:8px;overflow:hidden;
  }
  .progress-bar-fill{
    height:100%;background:linear-gradient(90deg,var(--rojo),var(--rojo-oscuro));
    border-radius:8px;transition:width .4s ease;
  }
  .progress-label{font-size:13px;margin:6px 0;font-weight:600;color:var(--gris);}

  .cards-row{display:flex;gap:8px;margin-bottom:14px;}
  .stat-card{
    flex:1;border-radius:8px;padding:10px 6px;text-align:center;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
  }
  .stat-card .num{font-size:20px;font-weight:800;}
  .stat-card .lbl{font-size:10.5px;font-weight:600;margin-top:2px;}
  .stat-card.completos{background:#ecfdf3;color:#15803d;}
  .stat-card.parciales{background:#fffbeb;color:#b45309;}
  .stat-card.pendientes{background:#fef2f2;color:#b91c1c;}

  input[type="text"], input[type="number"], input[inputmode="numeric"]{
    width:100%;height:48px;border-radius:8px;border:1px solid #d4d4d8;
    padding:0 12px;font-size:16px;background:var(--blanco);color:var(--gris);
  }
  input:focus{outline:none;border-color:var(--rojo);}

  .search-box{margin-bottom:12px;}

  .filters{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;}
  .filter-btn{
    flex:1;min-height:40px;border-radius:8px;border:1px solid #d4d4d8;
    background:var(--blanco);color:var(--gris);font-size:12.5px;font-weight:600;
    white-space:nowrap;padding:0 8px;
  }
  .filter-btn.active{background:var(--rojo);color:var(--blanco);border-color:var(--rojo);}

  .product-list{display:flex;flex-direction:column;gap:8px;}
  .product-item{
    border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);
    padding:10px 12px;display:flex;align-items:center;gap:10px;
    background:var(--blanco);border-left:5px solid #ccc;
  }
  .product-item.completo{border-left-color:var(--verde);}
  .product-item.parcial{border-left-color:var(--amarillo);}
  .product-item.pendiente{border-left-color:var(--rojo-pend);}
  .product-item .info{flex:1;min-width:0;}
  .product-item .codigo{font-weight:700;font-size:13px;color:var(--rojo-oscuro);}
  .product-item .desc{font-size:12px;color:var(--gris);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .product-item .meta{font-size:11px;color:#888;margin-top:2px;}
  .chip{
    font-size:10.5px;font-weight:700;color:var(--blanco);
    padding:4px 8px;border-radius:20px;flex-shrink:0;white-space:nowrap;
  }
  .chip.completo{background:var(--verde);}
  .chip.parcial{background:var(--amarillo);}
  .chip.pendiente{background:var(--rojo-pend);}

  .btn{
    min-height:48px;border-radius:8px;border:none;font-size:15px;font-weight:700;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .btn-primary{background:var(--rojo);color:var(--blanco);width:100%;}
  .btn-primary:active{background:var(--rojo-oscuro);}
  .btn-secondary{background:#f4f4f5;color:var(--gris);width:100%;border:1px solid #d4d4d8;}
  .btn-block{width:100%;margin-top:10px;}

  .detail-header-card{
    background:var(--blanco);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);
    padding:14px;margin-bottom:14px;
  }
  .detail-header-card h2{font-size:17px;margin:0 0 4px;color:var(--gris);}
  .detail-header-card .codigo-big{font-size:14px;font-weight:700;color:var(--rojo);margin-bottom:6px;}
  .detail-header-card .marca-cat{font-size:12px;color:#888;margin-bottom:10px;}
  .recibido-line{font-size:14px;font-weight:700;margin-bottom:6px;}
  .estado-chip-big{
    display:inline-block;padding:6px 14px;border-radius:20px;color:var(--blanco);
    font-weight:800;font-size:13px;margin-top:8px;
  }

  .box-list{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
  .box-item{
    display:flex;align-items:center;justify-content:space-between;
    background:#f9f9fa;border-radius:8px;padding:8px 10px;font-size:13px;
  }
  .box-item .del{
    background:none;border:none;color:var(--rojo-pend);font-size:18px;font-weight:800;
    width:32px;height:32px;
  }

  .form-card{
    background:var(--blanco);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);
    padding:14px;margin-top:14px;
  }
  .form-card label{font-size:12.5px;font-weight:700;display:block;margin-bottom:4px;margin-top:10px;}
  .warn-text{font-size:12px;color:var(--amarillo);font-weight:700;margin-top:6px;}

  .confirm-flash{
    text-align:center;color:var(--verde);font-weight:800;font-size:14px;
    margin-top:8px;animation:fadeOut 2s forwards;
  }
  @keyframes fadeOut{0%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}

  .celebrate{
    text-align:center;background:#ecfdf3;color:#15803d;font-weight:800;
    border-radius:8px;padding:10px;margin-top:8px;font-size:14px;
  }

  .section-title{font-size:14px;font-weight:800;margin:18px 0 8px;color:var(--gris);}
  .report-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:10px;}
  .report-table th,.report-table td{border-bottom:1px solid #eee;padding:6px 4px;text-align:left;}
  .report-list{font-size:12.5px;line-height:1.6;}
  .report-list .item-line{padding:6px 0;border-bottom:1px solid #f0f0f0;}

  .empty-msg{text-align:center;color:#aaa;padding:30px 10px;font-size:13px;}

  @media print{
    header.topbar, .no-print{display:none !important;}
    body{background:#fff;}
    #app{max-width:100%;}
  }
</style>

const STORAGE_KEY = "km0_recepcion_estado";

function cargarEstado(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && parsed.registros) return parsed;
    }
  }catch(e){}
  const ahora = new Date().toISOString();
  return { sesion_id: ahora.slice(0,10), fecha_inicio: ahora, fecha_ultima_actualizacion: ahora, registros: {} };
}

let estado = cargarEstado();

function guardarEstado(){
  estado.fecha_ultima_actualizacion = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
}

function normalizar(str){
  return (str||"").toString().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function unidadesRecibidas(codigo){
  const lista = estado.registros[codigo] || [];
  return lista.reduce((sum, r) => sum + r.unidades, 0);
}

function estadoProducto(producto){
  const recibido = unidadesRecibidas(producto.codigo);
  if(recibido <= 0) return "pendiente";
  if(recibido >= producto.cantidadEsperada) return "completo";
  return "parcial";
}

// ---------- Routing / state ----------
let vista = "lista"; // lista | detalle | reporte
let productoActual = null; // codigo
let filtroActivo = "todos";
let textoBusqueda = "";

function irALista(){ vista="lista"; productoActual=null; render(); }
function irADetalle(codigo){ vista="detalle"; productoActual=codigo; render(); }
function irAReporte(){ vista="reporte"; render(); }

// ---------- Render ----------
const appEl = document.getElementById("app");

function render(){
  if(vista === "lista") renderLista();
  else if(vista === "detalle") renderDetalle();
  else if(vista === "reporte") renderReporte();
}

function renderHeader(titulo, subtitulo, conBack, accionBack){
  return `
    <header class="topbar">
      ${conBack ? `<button class="back" id="btnBack">‹</button>` : ""}
      <div>
        <h1>${titulo}</h1>
        ${subtitulo ? `<p class="sub">${subtitulo}</p>` : ""}
      </div>
    </header>
  `;
}

function contarEstados(){
  let completos=0, parciales=0, pendientes=0;
  PRODUCTOS_FACTURA.forEach(p=>{
    const e = estadoProducto(p);
    if(e==="completo") completos++;
    else if(e==="parcial") parciales++;
    else pendientes++;
  });
  return {completos, parciales, pendientes, total: PRODUCTOS_FACTURA.length};
}

function renderLista(){
  const {completos, parciales, pendientes, total} = contarEstados();
  const pct = total ? Math.round((completos/total)*100) : 0;

  let productos = PRODUCTOS_FACTURA.slice();

  if(textoBusqueda.trim()){
    const q = normalizar(textoBusqueda);
    productos = productos.filter(p =>
      normalizar(p.codigo).includes(q) || normalizar(p.descripcion).includes(q)
    );
  }

  if(filtroActivo !== "todos"){
    productos = productos.filter(p => estadoProducto(p) === filtroActivo);
  }

  const ordenPrioridad = {pendiente:0, parcial:1, completo:2};
  productos.sort((a,b)=> ordenPrioridad[estadoProducto(a)] - ordenPrioridad[estadoProducto(b)]);

  const itemsHtml = productos.length === 0
    ? `<div class="empty-msg">No se encontraron productos.</div>`
    : productos.map(p=>{
        const recibido = unidadesRecibidas(p.codigo);
        const est = estadoProducto(p);
        const labelEstado = est==="completo"?"COMPLETO":est==="parcial"?"PARCIAL":"PENDIENTE";
        return `
          <div class="product-item ${est}" data-codigo="${escAttr(p.codigo)}">
            <div class="info">
              <div class="codigo">${esc(p.codigo)}</div>
              <div class="desc">${esc(p.descripcion)}</div>
              <div class="meta">${esc(p.marca)} · ${recibido} / ${p.cantidadEsperada} unidades</div>
            </div>
            <span class="chip ${est}">${labelEstado}</span>
          </div>
        `;
      }).join("");

  appEl.innerHTML = `
    ${renderHeader("KM0 — Recepción de Inventario")}
    <div class="container">
      <div class="progress-wrap">
        <div class="progress-label">${completos} de ${total} productos completados (${pct}%)</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="cards-row">
        <div class="stat-card completos"><div class="num">${completos}</div><div class="lbl">✅ Completos</div></div>
        <div class="stat-card parciales"><div class="num">${parciales}</div><div class="lbl">⚠️ Parciales</div></div>
        <div class="stat-card pendientes"><div class="num">${pendientes}</div><div class="lbl">❌ Sin registrar</div></div>
      </div>
      <div class="search-box">
        <input type="text" id="buscador" placeholder="Buscar por código o descripción..." value="${escAttr(textoBusqueda)}">
      </div>
      <div class="filters">
        <button class="filter-btn ${filtroActivo==='todos'?'active':''}" data-filtro="todos">Todos</button>
        <button class="filter-btn ${filtroActivo==='pendiente'?'active':''}" data-filtro="pendiente">Pendientes</button>
        <button class="filter-btn ${filtroActivo==='parcial'?'active':''}" data-filtro="parcial">Parciales</button>
        <button class="filter-btn ${filtroActivo==='completo'?'active':''}" data-filtro="completo">Completos</button>
      </div>
      <div class="product-list">${itemsHtml}</div>
      <button class="btn btn-primary btn-block no-print" id="btnReporte">📋 Ver reporte final</button>
    </div>
  `;

  document.getElementById("buscador").addEventListener("input", e=>{
    textoBusqueda = e.target.value;
    renderLista();
    document.getElementById("buscador").focus();
    const val = document.getElementById("buscador").value;
    document.getElementById("buscador").setSelectionRange(val.length, val.length);
  });
  document.querySelectorAll(".filter-btn").forEach(b=>{
    b.addEventListener("click", ()=>{ filtroActivo = b.dataset.filtro; renderLista(); });
  });
  document.querySelectorAll(".product-item").forEach(item=>{
    item.addEventListener("click", ()=> irADetalle(item.dataset.codigo));
  });
  document.getElementById("btnReporte").addEventListener("click", irAReporte);
}

let mensajeFlash = null; // {tipo:'ok'|'celebracion', texto}

function renderDetalle(){
  const producto = PRODUCTOS_FACTURA.find(p=>p.codigo===productoActual);
  if(!producto){ irALista(); return; }

  const recibido = unidadesRecibidas(producto.codigo);
  const est = estadoProducto(producto);
  const labelEstado = est==="completo"?"COMPLETO":est==="parcial"?"PARCIAL":"PENDIENTE";
  const colorEstado = est==="completo" ? "var(--verde)" : est==="parcial" ? "var(--amarillo)" : "var(--rojo-pend)";
  const pct = Math.min(100, Math.round((recibido/producto.cantidadEsperada)*100));

  const cajas = (estado.registros[producto.codigo]||[]).slice().sort((a,b)=> new Date(b.timestamp)-new Date(a.timestamp));
  const cajasHtml = cajas.length === 0
    ? `<div class="empty-msg">Todavía no se ha registrado ninguna caja.</div>`
    : cajas.map((c,idx)=>{
        const hora = new Date(c.timestamp).toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'});
        return `
          <div class="box-item">
            <span>Bulto #${esc(c.bulto)} · ${esc(c.unidades)} unidades · ${hora}</span>
            <button class="del" data-bulto="${escAttr(c.bulto)}" data-ts="${escAttr(c.timestamp)}">×</button>
          </div>
        `;
      }).join("");

  appEl.innerHTML = `
    ${renderHeader("Detalle del producto", null, true)}
    <div class="container">
      <div class="detail-header-card">
        <div class="codigo-big">${esc(producto.codigo)}</div>
        <h2>${esc(producto.descripcion)}</h2>
        <div class="marca-cat">${esc(producto.marca)} · ${esc(producto.categoria)} · Factura ${esc(producto.factura)}</div>
        <div class="recibido-line">Recibido: ${recibido} unidades de ${producto.cantidadEsperada} esperadas</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span class="estado-chip-big" style="background:${colorEstado}">${labelEstado}</span>
        ${mensajeFlash && mensajeFlash.tipo==='celebracion' ? `<div class="celebrate">🎉 ¡Producto completado!</div>` : ""}
        ${mensajeFlash && mensajeFlash.tipo==='ok' ? `<div class="confirm-flash">✓ ${esc(mensajeFlash.texto)}</div>` : ""}
      </div>

      <div class="section-title">Cajas registradas</div>
      <div class="box-list">${cajasHtml}</div>

      <div class="form-card">
        <div class="section-title" style="margin-top:0;">Registrar nueva caja</div>
        <label for="inpBulto"># Bulto</label>
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="inpBulto" placeholder="Ej: 47" maxlength="3">
        <label for="inpUnidades">Unidades en esta caja</label>
        <input type="text" inputmode="numeric" pattern="[0-9]*" id="inpUnidades" placeholder="Ej: 20" maxlength="5">
        <div id="formError" class="warn-text" style="display:none;"></div>
        <button class="btn btn-primary btn-block" id="btnRegistrar">✓ Registrar caja</button>
      </div>
    </div>
  `;

  mensajeFlash = null;

  document.getElementById("btnBack").addEventListener("click", irALista);
  document.querySelectorAll(".box-item .del").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const bulto = btn.dataset.bulto;
      const ts = btn.dataset.ts;
      estado.registros[producto.codigo] = (estado.registros[producto.codigo]||[]).filter(r=>!(String(r.bulto)===bulto && r.timestamp===ts));
      guardarEstado();
      renderDetalle();
    });
  });

  document.getElementById("btnRegistrar").addEventListener("click", ()=>{
    const bultoRaw = document.getElementById("inpBulto").value.trim();
    const unidadesRaw = document.getElementById("inpUnidades").value.trim();
    const errEl = document.getElementById("formError");

    const bulto = parseInt(bultoRaw, 10);
    const unidades = parseInt(unidadesRaw, 10);

    if(!bultoRaw || isNaN(bulto) || bulto < 1 || bulto > 999){
      errEl.textContent = "Ingresa un número de bulto válido (1-999).";
      errEl.style.display = "block";
      return;
    }
    if(!unidadesRaw || isNaN(unidades) || unidades <= 0){
      errEl.textContent = "Ingresa una cantidad de unidades mayor a 0.";
      errEl.style.display = "block";
      return;
    }

    if(!estado.registros[producto.codigo]) estado.registros[producto.codigo] = [];
    const yaExiste = estado.registros[producto.codigo].some(r=> r.bulto === bulto);

    const recibidoPrevio = unidadesRecibidas(producto.codigo);
    estado.registros[producto.codigo].push({
      bulto, unidades, timestamp: new Date().toISOString()
    });
    guardarEstado();

    const recibidoNuevo = unidadesRecibidas(producto.codigo);
    if(recibidoPrevio < producto.cantidadEsperada && recibidoNuevo >= producto.cantidadEsperada){
      mensajeFlash = { tipo: "celebracion" };
    } else {
      mensajeFlash = { tipo: "ok", texto: `Bulto #${bulto} registrado (${unidades} unidades)${yaExiste ? " — bulto repetido" : ""}` };
    }

    renderDetalle();
  });
}

function renderReporte(){
  const {completos, parciales, pendientes, total} = contarEstados();

  const todasCajas = [];
  PRODUCTOS_FACTURA.forEach(p=>{
    (estado.registros[p.codigo]||[]).forEach(c=>{
      todasCajas.push({bulto:c.bulto, producto:p, unidades:c.unidades});
    });
  });
  todasCajas.sort((a,b)=> a.bulto - b.bulto);

  const faltantes = PRODUCTOS_FACTURA.filter(p=> unidadesRecibidas(p.codigo) === 0);
  const incompletos = PRODUCTOS_FACTURA.filter(p=>{
    const r = unidadesRecibidas(p.codigo);
    return r > 0 && r < p.cantidadEsperada;
  });
  const excedentes = PRODUCTOS_FACTURA.filter(p=> unidadesRecibidas(p.codigo) > p.cantidadEsperada);

  const tablaBultosHtml = todasCajas.length === 0
    ? `<div class="empty-msg">Aún no hay bultos registrados.</div>`
    : `<table class="report-table">
        <thead><tr><th>#Bulto</th><th>Producto</th><th>Unidades</th></tr></thead>
        <tbody>
          ${todasCajas.map(c=>`<tr><td>${esc(c.bulto)}</td><td>${esc(c.producto.codigo)}</td><td>${esc(c.unidades)}</td></tr>`).join("")}
        </tbody>
      </table>`;

  const faltantesHtml = faltantes.length===0 ? `<div class="empty-msg">Ninguno 🎉</div>` :
    `<div class="report-list">${faltantes.map(p=>`<div class="item-line">• ${esc(p.codigo)} — ${esc(p.descripcion)}: 0/${p.cantidadEsperada}</div>`).join("")}</div>`;

  const incompletosHtml = incompletos.length===0 ? `<div class="empty-msg">Ninguno 🎉</div>` :
    `<div class="report-list">${incompletos.map(p=>{
      const r = unidadesRecibidas(p.codigo);
      return `<div class="item-line">• ${esc(p.codigo)} — ${esc(p.descripcion)}: ${r}/${p.cantidadEsperada} (faltan ${p.cantidadEsperada-r})</div>`;
    }).join("")}</div>`;

  const excedentesHtml = excedentes.length===0 ? `<div class="empty-msg">Ninguno</div>` :
    `<div class="report-list">${excedentes.map(p=>{
      const r = unidadesRecibidas(p.codigo);
      return `<div class="item-line">• ${esc(p.codigo)} — ${esc(p.descripcion)}: ${r}/${p.cantidadEsperada} (excedente ${r-p.cantidadEsperada})</div>`;
    }).join("")}</div>`;

  appEl.innerHTML = `
    ${renderHeader("Reporte final", null, true)}
    <div class="container">
      <div class="detail-header-card">
        <div class="recibido-line">Total productos: ${total}</div>
        <div>✅ Completos: ${completos} &nbsp; ⚠️ Parciales: ${parciales} &nbsp; ❌ Sin registrar: ${pendientes}</div>
      </div>

      <div class="section-title">Bultos registrados</div>
      ${tablaBultosHtml}

      <div class="section-title">🔴 Faltantes (0 unidades)</div>
      ${faltantesHtml}

      <div class="section-title">⚠️ Incompletos</div>
      ${incompletosHtml}

      <div class="section-title">📈 Excedentes</div>
      ${excedentesHtml}

      <button class="btn btn-secondary btn-block no-print" id="btnCopiar">📋 Copiar reporte para WhatsApp</button>
      <button class="btn btn-primary btn-block no-print" id="btnPdf">🖨️ Guardar como PDF</button>
      <div id="copiarMsg" class="confirm-flash" style="display:none;">✓ Reporte copiado al portapapeles</div>

      <div class="section-title">Respaldo de datos</div>
      <button class="btn btn-secondary btn-block no-print" id="btnExportar">⬇️ Exportar datos (JSON)</button>
      <button class="btn btn-secondary btn-block no-print" id="btnImportar">⬆️ Importar datos (JSON)</button>
      <input type="file" id="inputImportar" accept="application/json,.json" style="display:none;">
      <div id="importarMsg" class="confirm-flash" style="display:none;"></div>
    </div>
  `;

  document.getElementById("btnBack").addEventListener("click", irALista);
  document.getElementById("btnPdf").addEventListener("click", ()=> window.print());
  document.getElementById("btnCopiar").addEventListener("click", async ()=>{
    const texto = generarTextoWhatsApp(completos, parciales, pendientes, total, faltantes, incompletos);
    try{
      await navigator.clipboard.writeText(texto);
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = texto; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    }
    const msg = document.getElementById("copiarMsg");
    msg.style.display = "block";
    setTimeout(()=>{ msg.style.display = "none"; }, 2000);
  });

  document.getElementById("btnExportar").addEventListener("click", exportarDatos);

  const inputImportar = document.getElementById("inputImportar");
  document.getElementById("btnImportar").addEventListener("click", ()=> inputImportar.click());
  inputImportar.addEventListener("change", (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const msgEl = document.getElementById("importarMsg");
      try{
        const data = JSON.parse(ev.target.result);
        if(!data || typeof data.registros !== "object") throw new Error("formato inválido");
        estado = data;
        guardarEstado();
        msgEl.textContent = "✓ Datos importados correctamente";
        msgEl.style.display = "block";
        renderReporte();
      }catch(err){
        msgEl.textContent = "✗ El archivo no tiene un formato válido";
        msgEl.style.color = "var(--rojo-pend)";
        msgEl.style.display = "block";
      }
    };
    reader.readAsText(file);
    inputImportar.value = "";
  });
}

function exportarDatos(){
  const fecha = new Date().toISOString().slice(0,10);
  const blob = new Blob([JSON.stringify(estado, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `km0_recepcion_${fecha}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function generarTextoWhatsApp(completos, parciales, pendientes, total, faltantes, incompletos){
  const fecha = new Date().toLocaleDateString('es-VE');
  let txt = `📦 RECEPCIÓN KM0 — ${fecha}\n`;
  txt += `✅ Completos: ${completos}/${total}\n`;
  txt += `⚠️ Parciales: ${parciales}/${total}\n`;
  txt += `❌ Pendientes: ${pendientes}/${total}\n\n`;

  txt += `🔴 FALTANTES:\n`;
  if(faltantes.length === 0) txt += `• Ninguno\n`;
  else faltantes.forEach(p=> txt += `• ${p.codigo} — ${p.descripcion}: 0/${p.cantidadEsperada}\n`);

  txt += `\n⚠️ INCOMPLETOS:\n`;
  if(incompletos.length === 0) txt += `• Ninguno\n`;
  else incompletos.forEach(p=>{
    const r = unidadesRecibidas(p.codigo);
    txt += `• ${p.codigo} — ${p.descripcion}: ${r}/${p.cantidadEsperada} (faltan ${p.cantidadEsperada-r})\n`;
  });

  return txt;
}

function esc(str){
  return String(str).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function escAttr(str){ return esc(str); }

render();
</script>
</body>
</html>
